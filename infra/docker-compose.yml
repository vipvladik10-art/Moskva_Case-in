name: asphalt-weather

services:
  db:
    image: timescale/timescaledb-ha:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-asphalt}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-asphalt}
      POSTGRES_DB: ${POSTGRES_DB:-asphalt}
    ports:
      - "5432:5432"
    volumes:
      - db-data:/home/postgres/pgdata/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER}"]
      interval: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build:
      context: ..
      dockerfile: infra/Dockerfile.backend
    env_file: [../.env]
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-asphalt}:${POSTGRES_PASSWORD:-asphalt}@db:5432/${POSTGRES_DB:-asphalt}
      REDIS_URL: redis://redis:6379/0
      ML_MODELS_DIR: /repo-data/models
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    ports:
      - "8001:8000"
    volumes:
      - ../backend:/app
      - ../data:/repo-data
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ..
      dockerfile: infra/Dockerfile.frontend
    environment:
      VITE_API_BASE_URL: http://localhost:8001/api/v1
    ports:
      - "5173:5173"
    volumes:
      - ../frontend:/app
      - /app/node_modules
    command: npm run dev -- --host

volumes:
  db-data:
